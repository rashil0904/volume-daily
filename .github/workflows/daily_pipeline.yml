name: NSE Daily Pipeline

on:
  schedule:
    - cron: '31 9 18 7 *'   # 3:01 PM IST Jul 18 — test run, remove after 2026-07-19
    - cron: '31 9 19 7 *'   # 3:01 PM IST Jul 19 — test run, remove after 2026-07-20
  workflow_dispatch:           # triggered by Mac launchd at 3:01 PM IST (5:31 AM EDT)

env:
  TZ: Asia/Kolkata

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Get date (IST)
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create output directories
        run: mkdir -p data/market_cap_daily data/candles data/instruments results

      - name: Run pipeline
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: python pipeline/run_daily.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_cap_daily/ data/candles/ data/instruments/ data/universe_combined.csv results/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Pipeline results ${{ steps.date.outputs.date }}"
            git push
          fi

      - name: Upload trade list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-list-${{ steps.date.outputs.date }}
          path: results/trade_list_*.csv
          if-no-files-found: ignore
