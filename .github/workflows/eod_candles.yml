name: EOD Candle Update

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 4:00 PM IST (UTC+5:30), Mon–Fri
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  update-candles:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pipeline/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch today's complete candles (15:00 and 15:15 included)
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: |
          python - <<'PYEOF'
          import sys, csv
          from pathlib import Path
          from datetime import date
          sys.path.insert(0, 'pipeline')
          import fetch_candles as fc

          with open('data/instruments/upstox_instruments.csv') as f:
              instruments = list(csv.DictReader(f))

          today = date.today()
          print(f"Fetching complete candles for {today} ({len(instruments)} symbols) ...")
          fc.fetch_append_historical(instruments, from_date=today, to_date=today)
          PYEOF

      - name: Commit and push updated candles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candles/
          if git diff --staged --quiet; then
            echo "No candle changes to commit."
          else
            git commit -m "EOD candle update $(date +%Y-%m-%d) — 15:00/15:15 data added"
            git push
          fi
